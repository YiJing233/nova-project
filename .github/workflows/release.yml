name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的 Git tag，例如 v0.1.5"
        required: true
        type: string

permissions:
  contents: write

jobs:
  github-release:
    name: Build CLI release assets
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build CLI release assets
        run: scripts/build-github-release.sh "${RELEASE_TAG}"

      - name: Upload CLI assets
        uses: actions/upload-artifact@v4
        with:
          name: cli-assets
          path: dist/github-release/nova-*

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" --title "${RELEASE_TAG}" --notes-file dist/github-release/RELEASE_NOTES.md
            gh release upload "${RELEASE_TAG}" dist/github-release/nova-* dist/github-release/checksums.txt --clobber
          else
            gh release create "${RELEASE_TAG}" dist/github-release/nova-* dist/github-release/checksums.txt --title "${RELEASE_TAG}" --notes-file dist/github-release/RELEASE_NOTES.md
          fi

  build-tauri:
    name: Build Desktop Apps (Tauri)
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--bundles dmg"
          - platform: ubuntu-latest
            args: "--bundles deb,appimage"
          - platform: windows-latest
            args: "--bundles nsis"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./desktop/tauri -> target"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install root dependencies
        run: pnpm install

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libsoup-3.0-dev

      - name: Install web frontend dependencies
        run: |
          cd web
          pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          configPath: desktop/tauri/tauri.conf.json
          args: ${{ matrix.args }}

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            desktop/tauri/target/release/bundle/dmg/*.dmg
            desktop/tauri/target/release/bundle/macos/*.app
            desktop/tauri/target/release/bundle/nsis/*.exe
            desktop/tauri/target/release/bundle/appimage/*.AppImage
            desktop/tauri/target/release/bundle/deb/*.deb
